<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Notebook - StudyOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090B14',
                        darkCard: '#111827',
                        accent: '#6D5EF7',
                        success: '#22C55E',
                        warning: '#F59E0B',
                        danger: '#EF4444',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        .color-swatch { transition: transform .15s ease, box-shadow .15s ease; }
        .color-swatch:hover { transform: scale(1.12); }
        .color-swatch[data-active="true"] { box-shadow: 0 0 0 3px #090B14, 0 0 0 5px currentColor; transform: scale(1.1); }
        .icon-option { transition: all .15s ease; }
        .icon-option[data-active="true"] { background: var(--pick-color, #6D5EF7); color: #fff; border-color: transparent; }
    </style>
</head>
<body class="bg-darkBg text-gray-100 font-sans min-h-screen flex flex-col">

    <header class="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-darkBg/80 backdrop-blur-md shrink-0">
        <div class="flex items-center gap-3 text-gray-400 text-sm">
            <a href="/hub" class="hover:text-white transition-colors">Study Hub</a><i class="fa-solid fa-chevron-right text-[10px]"></i><span class="text-white font-medium">New Notebook</span>
        </div>
        <a href="/hub" class="text-gray-400 hover:text-white text-sm flex items-center gap-2"><i class="fa-solid fa-xmark"></i> Cancel</a>
    </header>

    <main class="flex-1 flex items-start justify-center p-8">
        <div class="w-full max-w-2xl">

            <div class="text-center mb-8">
                <div id="live-icon-preview" class="w-20 h-20 rounded-2xl mx-auto mb-4 flex items-center justify-center text-3xl transition-all duration-300" style="background:#6D5EF722; color:#6D5EF7; border:1px solid #6D5EF744;">
                    <i id="live-icon" class="fa-solid fa-book"></i>
                </div>
                <h1 class="text-2xl font-bold text-white mb-1">Create a Notebook</h1>
                <p class="text-sm text-gray-500">Give it a name, a color, and an icon — you can change these anytime.</p>
            </div>

            <form id="create-form" class="bg-darkCard border border-white/5 rounded-2xl p-7 flex flex-col gap-7">

                <!-- Title -->
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block">Notebook Title</label>
                    <input id="title-input" type="text" required maxlength="60" placeholder="e.g. Operating Systems, Linear Algebra…"
                        class="w-full bg-darkBg border border-white/10 rounded-xl py-3.5 px-4 text-white text-lg font-semibold focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all placeholder-gray-600">
                </div>

                <!-- Description -->
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block">Description <span class="text-gray-600 font-normal normal-case">(optional)</span></label>
                    <textarea id="desc-input" rows="2" maxlength="160" placeholder="What's this notebook for?"
                        class="w-full bg-darkBg border border-white/10 rounded-xl py-3 px-4 text-sm text-white focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all placeholder-gray-600 resize-none"></textarea>
                </div>

                <!-- Color -->
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 block">Color</label>
                    <div id="color-grid" class="flex flex-wrap gap-3"></div>
                </div>

                <!-- Icon -->
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 block">Icon</label>
                    <div id="icon-grid" class="grid grid-cols-8 sm:grid-cols-10 gap-2"></div>
                </div>

                <button type="submit" id="submit-btn" class="bg-accent hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-accent/25 mt-2">
                    <i class="fa-solid fa-plus"></i> Create Notebook
                </button>
            </form>
        </div>
    </main>

    <script>
        const USER_ID = 'Skydrop';

        const COLORS = [
            '#6D5EF7', '#22C55E', '#F59E0B', '#EF4444', '#06B6D4',
            '#EC4899', '#8B5CF6', '#10B981', '#F97316', '#3B82F6',
            '#A855F7', '#84CC16',
        ];

        const ICONS = [
            'fa-solid fa-book', 'fa-solid fa-flask', 'fa-solid fa-square-root-variable',
            'fa-solid fa-microchip', 'fa-solid fa-dna', 'fa-solid fa-globe',
            'fa-solid fa-landmark', 'fa-solid fa-palette', 'fa-solid fa-music',
            'fa-solid fa-code', 'fa-solid fa-atom', 'fa-solid fa-brain',
            'fa-solid fa-language', 'fa-solid fa-chart-line', 'fa-solid fa-gavel',
            'fa-solid fa-heart-pulse', 'fa-solid fa-rocket', 'fa-solid fa-cube',
            'fa-solid fa-leaf', 'fa-solid fa-graduation-cap',
        ];

        let selectedColor = COLORS[0];
        let selectedIcon = ICONS[0];

        function renderColors() {
            const grid = document.getElementById('color-grid');
            grid.innerHTML = COLORS.map(c => `
                <button type="button" class="color-swatch w-9 h-9 rounded-full" data-active="${c === selectedColor}"
                    style="background:${c}; color:${c};" onclick="pickColor('${c}')"></button>
            `).join('');
        }

        function renderIcons() {
            const grid = document.getElementById('icon-grid');
            grid.innerHTML = ICONS.map(ic => `
                <button type="button" class="icon-option w-10 h-10 rounded-xl border border-white/10 text-gray-400 flex items-center justify-center text-sm"
                    data-active="${ic === selectedIcon}" style="--pick-color:${selectedColor}" onclick="pickIcon('${ic}')">
                    <i class="${ic}"></i>
                </button>
            `).join('');
        }

        function pickColor(c) {
            selectedColor = c;
            renderColors();
            renderIcons();
            updatePreview();
        }

        function pickIcon(ic) {
            selectedIcon = ic;
            renderIcons();
            updatePreview();
        }

        function updatePreview() {
            const preview = document.getElementById('live-icon-preview');
            const icon = document.getElementById('live-icon');
            preview.style.background = selectedColor + '22';
            preview.style.color = selectedColor;
            preview.style.border = `1px solid ${selectedColor}44`;
            icon.className = selectedIcon;
        }

        renderColors();
        renderIcons();
        updatePreview();

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title-input').value.trim();
            if (!title) return;
            const description = document.getElementById('desc-input').value.trim();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating…';

            try {
                const res = await fetch(`/api/smartnotebook/notebooks?user_id=${USER_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        description: description || null,
                        color: selectedColor,
                        icon: selectedIcon,
                    })
                });
                const json = await res.json();
                if (res.ok && json.data && json.data._id) {
                    window.location.href = `/hub/notebooks/${json.data._id}`;
                } else {
                    throw new Error(json.detail || 'Failed to create notebook');
                }
            } catch (err) {
                console.error('create notebook', err);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> Create Notebook';
                alert('Could not create notebook. Please try again.');
            }
        });
    </script>
</body>
</html>
